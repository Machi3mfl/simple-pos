    ListCashRegistersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CashRegisterListItem'

    OpenCashRegisterSessionRequest:
      type: object
      required: [cashRegisterId, openingFloatAmount]
      properties:
        cashRegisterId:
          type: string
        openingFloatAmount:
          type: number
          minimum: 0
        openingNotes:
          type: string
          maxLength: 240

    CloseCashRegisterSessionRequest:
      type: object
      required: [countedClosingAmount]
      properties:
        countedClosingAmount:
          type: number
          minimum: 0
        closingNotes:
          type: string
          maxLength: 240

    RecordCashMovementRequest:
      type: object
      required: [movementType, amount]
      properties:
        movementType:
          type: string
          enum: [cash_paid_in, cash_paid_out, safe_drop, adjustment]
        amount:
          type: number
          exclusiveMinimum: 0
        direction:
          type: string
          enum: [inbound, outbound]
        notes:
          type: string
          maxLength: 240

    Product:
      type: object
      required: [id, sku, name, categoryId, price, stock, minStock, imageUrl, isActive]
      properties:
        id:
          type: string
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        stock:
          type: number
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean

    ProductListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    ProductResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Product'

    ProductSourcingSearchItem:
      type: object
