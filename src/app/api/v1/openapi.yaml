        name:
          type: string
          minLength: 3
          maxLength: 80
        description:
          type: string
          maxLength: 240
        permissionCodes:
          type: array
          minItems: 1
          items:
            type: string
        clonedFromRoleId:
          type: string

    ReplaceUserRolesRequest:
      type: object
      required: [roleIds]
      properties:
        roleIds:
          type: array
          items:
            type: string

    CashRegisterSession:
      type: object
      required:
