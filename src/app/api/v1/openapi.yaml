        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        initialStock:
          type: integer
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        cost:
          type: [number, 'null']
          exclusiveMinimum: 0
        sourceImageUrl:
