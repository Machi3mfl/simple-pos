    ProductSourcingImportHistoryItem:
      type: object
      required:
        [
          id,
          productId,
          productName,
          productSku,
          providerId,
          sourceProductId,
          storedImagePublicUrl,
          mappedCategoryId,
          importedAt,
        ]
      properties:
        id:
          type: string
        productId:
          type: string
        productName:
          type: string
        productSku:
          type: string
        providerId:
          type: string
          enum: [carrefour]
        sourceProductId:
          type: string
        storedImagePublicUrl:
          type: string
        brand:
          type: [string, 'null']
        ean:
          type: [string, 'null']
        mappedCategoryId:
          type: string
        importedAt:
          type: string
          format: date-time

    ProductSourcingImportHistoryResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingImportHistoryItem'

    CreateProductRequest:
      type: object
      required: [name, categoryId, price, initialStock]
      properties:
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        initialStock:
          type: number
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
      description: Cost is required when initialStock is greater than 0.

    CreateProductMultipartRequest:
      type: object
      required: [name, categoryId, price, initialStock]
      properties:
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: string
          description: Decimal string.
        cost:
          type: string
          description: Decimal string. Required when initialStock is greater than 0.
        initialStock:
          type: string
          description: Integer string.
        minStock:
          type: string
          description: Integer string.
        imageUrl:
          type: string
          description: Remote or data URL. The server downloads it and stores it in managed storage.
        imageFile:
          type: string
          format: binary
          description: Uploaded image file. If both imageFile and imageUrl are informed, imageFile wins.

    UpdateProductRequest:
      type: object
      minProperties: 1
      properties:
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean

    UpdateProductMultipartRequest:
      type: object
      minProperties: 1
      properties:
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: string
          description: Decimal string.
        cost:
          type: string
          description: Decimal string.
        minStock:
          type: string
          description: Integer string.
        imageUrl:
          type: string
          description: Remote or data URL. The server downloads it and stores it in managed storage.
        imageFile:
          type: string
          format: binary
          description: Uploaded image file. If both imageFile and imageUrl are informed, imageFile wins.
        isActive:
          type: string
          enum: ['true', 'false']

    ProductsWorkspaceItem:
      type: object
      required:
        [id, sku, name, categoryId, price, averageCost, stock, minStock, imageUrl, isActive, stockState]
      properties:
        id:
          type: string
        sku:
          type: string
        ean:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
        averageCost:
          type: number
        stock:
          type: number
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean
        stockState:
          type: string
          enum: [with_stock, low_stock, out_of_stock, inactive]
        lastMovementAt:
          type: string
        lastMovementType:
          type: string
          enum: [inbound, outbound, adjustment]

    ProductsWorkspaceSummary:
      type: object
      required: [withStock, lowStock, outOfStock, stockValue]
