openapi: 3.1.0
info:
  title: simple-pos API
  version: 1.0.0-draft
  description: |
    Contract-first API baseline for MVP.
    Versioned under /api/v1 and aligned with workflow-manager planning artifacts.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Local API base

security:
  - bearerAuth: []

tags:
  - name: Catalog
    description: Product catalog and price management.
  - name: Sales
    description: Sale checkout and payment registration.
  - name: Inventory
    description: Stock movement registration and valuation inputs.
  - name: Reporting
    description: Read-only business intelligence endpoints.
  - name: Customers
    description: Customer records and debt summaries.
  - name: AccountsReceivable
    description: Debt payment registration.
  - name: Sync
    description: Offline event synchronization.
  - name: ProductSourcing
    description: External catalog search and assisted import orchestration.
  - name: AccessControl
    description: Temporary operator bootstrap and permission snapshot endpoints.
  - name: CashManagement
    description: Cash register session lifecycle and drawer state.

paths:
  /app-users:
    get:
      tags: [AccessControl]
      operationId: listSelectableAppUsers
      summary: List active selectable operators for the pre-auth bridge
      parameters:
        - in: query
          name: role
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Selectable operators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectableActorsResponse'

  /me:
    get:
      tags: [AccessControl]
      operationId: getCurrentActorSnapshot
      summary: Get current operator identity and permission snapshot
      responses:
        '200':
          description: Current actor snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'

  /me/assume-user:
    post:
      tags: [AccessControl]
      operationId: assumeUserSession
      summary: Assume an active operator during the pre-auth rollout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssumeUserSessionRequest'
      responses:
        '200':
          description: Operator assumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssumeUserSessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [AccessControl]
      operationId: clearAssumedUserSession
      summary: Clear the temporary assumed operator session
      responses:
        '200':
          description: Assumed operator cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /access-control/workspace:
    get:
      tags: [AccessControl]
      operationId: getAccessControlWorkspace
      summary: Get the role catalog, permission catalog, and user assignments for access administration
      responses:
        '200':
          description: Access-control workspace snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessControlWorkspaceResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /access-control/roles:
    post:
      tags: [AccessControl]
      operationId: createCustomRole
      summary: Create a custom role by bundling existing permission codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRoleRequest'
      responses:
        '201':
          description: Custom role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessControlRole'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /access-control/roles/{id}:
    put:
      tags: [AccessControl]
      operationId: updateCustomRole
      summary: Update a mutable custom role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRoleRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessControlRole'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [AccessControl]
      operationId: deleteCustomRole
      summary: Delete a mutable custom role with no remaining assignments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /access-control/users/{id}/roles:
    put:
      tags: [AccessControl]
      operationId: replaceUserRoleAssignments
      summary: Replace the role assignments for one application user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceUserRolesRequest'
      responses:
        '200':
          description: User role assignments replaced
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /cash-registers:
    get:
      tags: [CashManagement]
      operationId: listAccessibleCashRegisters
      summary: List active cash registers visible to the current operator
      responses:
        '200':
          description: Accessible cash registers with current active-session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCashRegistersResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-registers/{id}/active-session:
    get:
      tags: [CashManagement]
      operationId: getActiveCashRegisterSession
      summary: Get the active session for one cash register
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active session snapshot for the register
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveCashRegisterSessionResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-register-sessions:
    post:
      tags: [CashManagement]
      operationId: openCashRegisterSession
      summary: Open a cash register session with the initial float
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenCashRegisterSessionRequest'
      responses:
        '201':
          description: Opened cash register session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-register-sessions/{id}/close:
    post:
      tags: [CashManagement]
      operationId: closeCashRegisterSession
      summary: Close a cash register session with counted cash
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseCashRegisterSessionRequest'
      responses:
        '200':
          description: Closed cash register session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-register-sessions/{id}/approve-closeout:
    post:
      tags: [CashManagement]
      operationId: approveCashRegisterSessionCloseout
      summary: Approve a pending cash register closeout with discrepancy
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveCashRegisterCloseoutRequest'
      responses:
        '200':
          description: Approved and closed cash register session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSession'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-register-sessions/{id}/reopen:
    post:
      tags: [CashManagement]
      operationId: reopenCashRegisterSessionForRecount
      summary: Reopen a pending cash register closeout for recount
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reopened cash register session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSessionDetail'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /cash-register-sessions/{id}/movements:
    post:
      tags: [CashManagement]
      operationId: recordCashMovement
      summary: Record a manual cash movement on an open register session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordCashMovementRequest'
      responses:
        '201':
          description: Updated cash register session detail after recording the movement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSessionDetail'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /products:
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: activeOnly
          schema:
            type: boolean
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateProductMultipartRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/search:
    get:
      tags: [ProductSourcing]
      operationId: searchExternalProducts
      summary: Search Carrefour external catalog candidates
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 3
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 12
      responses:
        '200':
          description: External product sourcing search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingSearchResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/import:
    post:
      tags: [ProductSourcing]
      operationId: importExternalProducts
      summary: Import selected external catalog candidates into the internal catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingImportRequest'
      responses:
        '200':
          description: Assisted import result with partial success support
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingImportResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/category-mappings:
    get:
      tags: [ProductSourcing]
      operationId: listExternalCategoryMappings
      summary: List learned external category mappings for sourcing
      parameters:
        - in: query
          name: providerId
          required: false
          schema:
            type: string
            enum: [carrefour]
            default: carrefour
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 8
      responses:
        '200':
          description: Learned category mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingCategoryMappingsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [ProductSourcing]
      operationId: updateExternalCategoryMapping
      summary: Update or create a learned external category mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingCategoryMappingMutationRequest'
      responses:
        '200':
          description: Updated learned category mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingCategoryMapping'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [ProductSourcing]
      operationId: deleteExternalCategoryMapping
      summary: Delete a learned external category mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingCategoryMappingDeleteRequest'
      responses:
        '204':
          description: Mapping deleted
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/import-history:
    get:
      tags: [ProductSourcing]
      operationId: listImportedProductHistory
      summary: List recently imported sourcing items
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 6
      responses:
        '200':
          description: Recent sourcing imports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingImportHistoryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/workspace:
    get:
      tags: [Catalog]
      operationId: listProductsWorkspace
      summary: List products for unified products/inventory workspace
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: stockState
          schema:
            type: string
            enum: [all, with_stock, low_stock, out_of_stock, inactive]
        - in: query
          name: activeOnly
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [stock, name, recent, price]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Unified products workspace page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsWorkspaceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/{id}:
    patch:
      tags: [Catalog]
      operationId: updateProduct
      summary: Update or archive a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProductMultipartRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /products/import:
    post:
      tags: [Catalog]
      operationId: importProductsBatch
      summary: Create products in batch with partial row validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateProductsRequest'
      responses:
        '200':
          description: Batch import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateProductsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/price-batches:
    post:
      tags: [Catalog]
      operationId: applyBulkPriceUpdate
      summary: Apply bulk price update by scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkPriceUpdateRequest'
      responses:
        '200':
          description: Price batch applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkPriceUpdateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /sales:
    post:
      tags: [Sales]
      operationId: createSale
      summary: Register sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaleRequest'
      responses:
        '201':
          description: Sale created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /stock-movements:
    get:
      tags: [Inventory]
      operationId: listStockMovements
      summary: List stock movements with filters
      parameters:
        - in: query
          name: productId
          required: false
          schema:
            type: string
        - in: query
          name: movementType
          required: false
          schema:
            type: string
            enum: [inbound, outbound, adjustment]
        - in: query
          name: dateFrom
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Stock movement history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementHistoryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /stock-movements/import:
    post:
      tags: [Inventory]
      operationId: importStockMovementsBatch
      summary: Register stock movements in batch with partial row validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkStockMovementsRequest'
      responses:
        '200':
          description: Batch stock result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkStockMovementsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Inventory]
      operationId: registerStockMovement
      summary: Register stock movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockMovementRequest'
      responses:
        '201':
          description: Stock movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/top-products:
    get:
      tags: [Reporting]
      operationId: getTopProducts
      summary: Get top-selling products
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Top products report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopProductsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/profit-summary:
    get:
      tags: [Reporting]
      operationId: getProfitSummary
      summary: Get revenue/cost/profit summary
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Profit summary report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitSummaryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/sales-history:
    get:
      tags: [Reporting]
      operationId: getSalesHistory
      summary: List sales history with date and payment filters
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: paymentMethod
          required: false
          schema:
            type: string
            enum: [cash, on_account]
      responses:
        '200':
          description: Sales history report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesHistoryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /customers:
    get:
      tags: [Customers]
      operationId: searchCustomers
      summary: Search or list customers for on-account checkout
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Customer search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSearchResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Customers]
      operationId: createCustomer
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /customers/{id}/debt:
    get:
      tags: [Customers]
      operationId: getCustomerDebtSummary
      summary: Get customer debt summary and ledger
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Debt summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDebtSummaryResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /receivables:
    get:
      tags: [AccountsReceivable]
      operationId: listReceivablesSnapshot
      summary: List customers with outstanding receivables snapshot
      responses:
        '200':
          description: Receivables snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceivablesSnapshotResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /debt-payments:
    post:
      tags: [AccountsReceivable]
      operationId: createDebtPayment
      summary: Register debt payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDebtPaymentRequest'
      responses:
        '201':
          description: Debt payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPaymentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /sync/events:
    post:
      tags: [Sync]
      operationId: syncEvents
      summary: Synchronize offline queued events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncEventsBatchRequest'
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncEventsResultResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ErrorResponse:
      description: Standardized API error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SelectableActor:
      type: object
      required: [actorId, displayName, roleCodes, roleNames, assignedRegisterIds]
      properties:
        actorId:
          type: string
        displayName:
          type: string
        roleCodes:
          type: array
          items:
            type: string
        roleNames:
          type: array
          items:
            type: string
        assignedRegisterIds:
          type: array
          items:
            type: string

    SelectableActorsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SelectableActor'

    AssumeUserSessionRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string

    AssumeUserSessionResponse:
      allOf:
        - $ref: '#/components/schemas/SelectableActor'

    PermissionSnapshotNavigation:
      type: object
      required: [cashRegister, sales, receivables, products, reporting, sync, usersAdmin]
      properties:
        cashRegister:
          type: boolean
        sales:
          type: boolean
        receivables:
          type: boolean
        products:
          type: boolean
        reporting:
          type: boolean
        sync:
          type: boolean
        usersAdmin:
          type: boolean

    PermissionSnapshotWorkspaceCashRegister:
      type: object
      required: [canView, canCreateSale, canOpenSession, canCloseSession, canRecordManualCashMovement, canApproveDiscrepancyClose]
      properties:
        canView:
          type: boolean
        canCreateSale:
          type: boolean
        canOpenSession:
          type: boolean
        canCloseSession:
          type: boolean
        canRecordManualCashMovement:
          type: boolean
        canApproveDiscrepancyClose:
          type: boolean

    PermissionSnapshotWorkspaceSales:
      type: object
      required: [canView, canViewAllRegisters, canViewSaleDetail]
      properties:
        canView:
          type: boolean
        canViewAllRegisters:
          type: boolean
        canViewSaleDetail:
          type: boolean

    PermissionSnapshotWorkspaceReceivables:
      type: object
      required: [canView, canRegisterPayment, canViewSensitiveNotes]
      properties:
        canView:
          type: boolean
        canRegisterPayment:
          type: boolean
        canViewSensitiveNotes:
          type: boolean

    PermissionSnapshotWorkspaceProducts:
      type: object
      required: [canView, canCreateFromSourcing, canUpdatePrice, canAdjustStock, canRunBulkImport, canViewInventoryCost]
      properties:
        canView:
          type: boolean
        canCreateFromSourcing:
          type: boolean
        canUpdatePrice:
          type: boolean
        canAdjustStock:
          type: boolean
        canRunBulkImport:
          type: boolean
        canViewInventoryCost:
          type: boolean

    PermissionSnapshotWorkspaceReporting:
      type: object
      required: [canView, canViewExecutiveMetrics, canViewMargin, canViewInventoryValue, canViewCreditExposure]
      properties:
        canView:
          type: boolean
        canViewExecutiveMetrics:
          type: boolean
        canViewMargin:
          type: boolean
        canViewInventoryValue:
          type: boolean
        canViewCreditExposure:
          type: boolean

    PermissionSnapshotWorkspaceSync:
      type: object
      required: [canView]
      properties:
        canView:
          type: boolean

    PermissionSnapshotWorkspaceUsersAdmin:
      type: object
      required: [canView, canAssignRoles, canManageUsers, canManageRoles]
      properties:
        canView:
          type: boolean
        canAssignRoles:
          type: boolean
        canManageUsers:
          type: boolean
        canManageRoles:
          type: boolean

    PermissionSnapshotWorkspaces:
      type: object
      required: [cashRegister, sales, receivables, products, reporting, sync, usersAdmin]
      properties:
        cashRegister:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceCashRegister'
        sales:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceSales'
        receivables:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceReceivables'
        products:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceProducts'
        reporting:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceReporting'
        sync:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceSync'
        usersAdmin:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaceUsersAdmin'

    PermissionSnapshotDataVisibility:
      type: object
      required: [salesScope, receivablesScope, canViewInventoryCost, canViewProfitMetrics, canViewAuditMetadata]
      properties:
        salesScope:
          type: string
          enum: [none, own_register, assigned_registers, store]
        receivablesScope:
          type: string
          enum: [none, summary_only, full]
        canViewInventoryCost:
          type: boolean
        canViewProfitMetrics:
          type: boolean
        canViewAuditMetadata:
          type: boolean

    PermissionSnapshot:
      type: object
      required: [permissionCodes, navigation, workspaces, dataVisibility]
      properties:
        permissionCodes:
          type: array
          items:
            type: string
        navigation:
          $ref: '#/components/schemas/PermissionSnapshotNavigation'
        workspaces:
          $ref: '#/components/schemas/PermissionSnapshotWorkspaces'
        dataVisibility:
          $ref: '#/components/schemas/PermissionSnapshotDataVisibility'

    MeResponseActor:
      type: object
      required: [actorId, displayName, actorKind, roleCodes, roleNames, assignedRegisterIds]
      properties:
        actorId:
          type: string
        displayName:
          type: string
        actorKind:
          type: string
          enum: [human, system]
        roleCodes:
          type: array
          items:
            type: string
        roleNames:
          type: array
          items:
            type: string
        assignedRegisterIds:
          type: array
          items:
            type: string

    MeResponse:
      type: object
      required: [actor, permissionSnapshot]
      properties:
        actor:
          $ref: '#/components/schemas/MeResponseActor'
        permissionSnapshot:
          $ref: '#/components/schemas/PermissionSnapshot'

    AccessControlPermission:
      type: object
      required: [id, code, name, groupCode, groupLabel, groupDescription]
      properties:
