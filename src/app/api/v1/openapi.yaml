openapi: 3.1.0
info:
  title: simple-pos API
  version: 1.0.0-draft
  description: |
    Contract-first API baseline for MVP.
    Versioned under /api/v1 and aligned with workflow-manager planning artifacts.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Local API base

security:
  - bearerAuth: []

tags:
  - name: Catalog
    description: Product catalog and price management.
  - name: Sales
    description: Sale checkout and payment registration.
  - name: Inventory
    description: Stock movement registration and valuation inputs.
  - name: Reporting
    description: Read-only business intelligence endpoints.
  - name: Customers
    description: Customer records and debt summaries.
  - name: AccountsReceivable
    description: Debt payment registration.
  - name: Sync
    description: Offline event synchronization.
  - name: ProductSourcing
    description: External catalog search and assisted import orchestration.

paths:
  /products:
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: activeOnly
          schema:
            type: boolean
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/search:
    get:
      tags: [ProductSourcing]
      operationId: searchExternalProducts
      summary: Search Carrefour external catalog candidates
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 3
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 12
      responses:
        '200':
          description: External product sourcing search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingSearchResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/import:
    post:
      tags: [ProductSourcing]
      operationId: importExternalProducts
      summary: Import selected external catalog candidates into the internal catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingImportRequest'
      responses:
        '200':
          description: Assisted import result with partial success support
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingImportResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /product-sourcing/category-mappings:
    get:
      tags: [ProductSourcing]
      operationId: listExternalCategoryMappings
      summary: List learned external category mappings for sourcing
      parameters:
        - in: query
          name: providerId
          required: false
          schema:
            type: string
            enum: [carrefour]
            default: carrefour
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 8
      responses:
        '200':
          description: Learned category mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingCategoryMappingsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [ProductSourcing]
      operationId: updateExternalCategoryMapping
      summary: Update or create a learned external category mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingCategoryMappingMutationRequest'
      responses:
        '200':
          description: Updated learned category mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSourcingCategoryMapping'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [ProductSourcing]
      operationId: deleteExternalCategoryMapping
      summary: Delete a learned external category mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSourcingCategoryMappingDeleteRequest'
      responses:
        '204':
          description: Mapping deleted
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/workspace:
    get:
      tags: [Catalog]
      operationId: listProductsWorkspace
      summary: List products for unified products/inventory workspace
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: stockState
          schema:
            type: string
            enum: [all, with_stock, low_stock, out_of_stock, inactive]
        - in: query
          name: activeOnly
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [stock, name, recent, price]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Unified products workspace page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsWorkspaceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/{id}:
    patch:
      tags: [Catalog]
      operationId: updateProduct
      summary: Update or archive a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /products/import:
    post:
      tags: [Catalog]
      operationId: importProductsBatch
      summary: Create products in batch with partial row validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateProductsRequest'
      responses:
        '200':
          description: Batch import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateProductsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /products/price-batches:
    post:
      tags: [Catalog]
      operationId: applyBulkPriceUpdate
      summary: Apply bulk price update by scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkPriceUpdateRequest'
      responses:
        '200':
          description: Price batch applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkPriceUpdateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /sales:
    post:
      tags: [Sales]
      operationId: createSale
      summary: Register sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaleRequest'
      responses:
        '201':
          description: Sale created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /stock-movements:
    get:
      tags: [Inventory]
      operationId: listStockMovements
      summary: List stock movements with filters
      parameters:
        - in: query
          name: productId
          required: false
          schema:
            type: string
        - in: query
          name: movementType
          required: false
          schema:
            type: string
            enum: [inbound, outbound, adjustment]
        - in: query
          name: dateFrom
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Stock movement history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementHistoryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /stock-movements/import:
    post:
      tags: [Inventory]
      operationId: importStockMovementsBatch
      summary: Register stock movements in batch with partial row validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkStockMovementsRequest'
      responses:
        '200':
          description: Batch stock result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkStockMovementsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Inventory]
      operationId: registerStockMovement
      summary: Register stock movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockMovementRequest'
      responses:
        '201':
          description: Stock movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/top-products:
    get:
      tags: [Reporting]
      operationId: getTopProducts
      summary: Get top-selling products
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Top products report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopProductsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/profit-summary:
    get:
      tags: [Reporting]
      operationId: getProfitSummary
      summary: Get revenue/cost/profit summary
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Profit summary report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitSummaryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /reports/sales-history:
    get:
      tags: [Reporting]
      operationId: getSalesHistory
      summary: List sales history with date and payment filters
      parameters:
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: paymentMethod
          required: false
          schema:
            type: string
            enum: [cash, on_account]
      responses:
        '200':
          description: Sales history report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesHistoryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /customers:
    post:
      tags: [Customers]
      operationId: createCustomer
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /customers/{id}/debt:
    get:
      tags: [Customers]
      operationId: getCustomerDebtSummary
      summary: Get customer debt summary and ledger
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: periodStart
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: periodEnd
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Debt summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDebtSummaryResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /debt-payments:
    post:
      tags: [AccountsReceivable]
      operationId: createDebtPayment
      summary: Register debt payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDebtPaymentRequest'
      responses:
        '201':
          description: Debt payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPaymentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /sync/events:
    post:
      tags: [Sync]
      operationId: syncEvents
      summary: Synchronize offline queued events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncEventsBatchRequest'
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncEventsResultResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ErrorResponse:
      description: Standardized API error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Product:
      type: object
      required: [id, sku, name, categoryId, price, stock, minStock, imageUrl, isActive]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        stock:
          type: number
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean

    ProductListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    ProductResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Product'

    ProductSourcingSearchItem:
      type: object
      required:
        [providerId, sourceProductId, name, brand, ean, categoryTrail, suggestedCategoryId, imageUrl, referencePrice, referenceListPrice, productUrl]
      properties:
        providerId:
          type: string
          enum: [carrefour]
        sourceProductId:
          type: string
        name:
          type: string
        brand:
          type: [string, 'null']
        ean:
          type: [string, 'null']
        categoryTrail:
          type: array
          items:
            type: string
        suggestedCategoryId:
          type: [string, 'null']
        imageUrl:
          type: [string, 'null']
          format: uri
        referencePrice:
          type: [number, 'null']
          minimum: 0
        referenceListPrice:
          type: [number, 'null']
          minimum: 0
        productUrl:
          type: [string, 'null']
          format: uri

    ProductSourcingSearchResponse:
      type: object
      required: [providerId, items, page, pageSize, hasMore]
      properties:
        providerId:
          type: string
          enum: [carrefour]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingSearchItem'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 12
        hasMore:
          type: boolean

    ProductSourcingImportItem:
      type: object
      required:
        [providerId, sourceProductId, name, categoryTrail, categoryId, price, initialStock, minStock]
      properties:
        providerId:
          type: string
          enum: [carrefour]
        sourceProductId:
          type: string
        name:
          type: string
        brand:
          type: [string, 'null']
        ean:
          type: [string, 'null']
        categoryTrail:
          type: array
          items:
            type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        initialStock:
          type: integer
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        cost:
          type: [number, 'null']
          exclusiveMinimum: 0
        sourceImageUrl:
          type: [string, 'null']
        productUrl:
          type: [string, 'null']
      description: Cost is required when initialStock is greater than 0.

    ProductSourcingImportRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ProductSourcingImportItem'

    ProductSourcingImportSuccessItem:
      type: object
      required: [row, providerId, sourceProductId, item]
      properties:
        row:
          type: integer
          minimum: 1
        providerId:
          type: string
          enum: [carrefour]
        sourceProductId:
          type: string
        item:
          $ref: '#/components/schemas/Product'

    ProductSourcingImportInvalidItem:
      type: object
      required: [row, sourceProductId, reason]
      properties:
        row:
          type: integer
          minimum: 1
        sourceProductId:
          type: string
        name:
          type: string
        reason:
          type: string

    ProductSourcingImportResponse:
      type: object
      required: [importedCount, items, invalidItems]
      properties:
        importedCount:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingImportSuccessItem'
        invalidItems:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingImportInvalidItem'

    ProductSourcingCategoryMapping:
      type: object
      required:
        [id, providerId, externalCategoryPath, internalCategoryId, createdAt, updatedAt]
      properties:
        id:
          type: string
        providerId:
          type: string
          enum: [carrefour]
        externalCategoryPath:
          type: string
        internalCategoryId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductSourcingCategoryMappingsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingCategoryMapping'

    ProductSourcingCategoryMappingMutationRequest:
      type: object
      required: [providerId, externalCategoryPath, internalCategoryId]
      properties:
        providerId:
          type: string
          enum: [carrefour]
        externalCategoryPath:
          type: string
        internalCategoryId:
          type: string

    ProductSourcingCategoryMappingDeleteRequest:
      type: object
      required: [providerId, externalCategoryPath]
      properties:
        providerId:
          type: string
          enum: [carrefour]
        externalCategoryPath:
          type: string

    CreateProductRequest:
      type: object
      required: [name, categoryId, price, initialStock]
      properties:
        sku:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        initialStock:
          type: number
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
      description: Cost is required when initialStock is greater than 0.

    UpdateProductRequest:
      type: object
      minProperties: 1
      properties:
        sku:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        cost:
          type: number
          exclusiveMinimum: 0
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean

    ProductsWorkspaceItem:
      type: object
      required:
        [id, sku, name, categoryId, price, averageCost, stock, minStock, imageUrl, isActive, stockState]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        categoryId:
          type: string
        price:
          type: number
        averageCost:
          type: number
        stock:
          type: number
        minStock:
          type: integer
          minimum: 0
        imageUrl:
          type: string
        isActive:
          type: boolean
        stockState:
          type: string
          enum: [with_stock, low_stock, out_of_stock, inactive]
        lastMovementAt:
          type: string
        lastMovementType:
          type: string
          enum: [inbound, outbound, adjustment]

    ProductsWorkspaceSummary:
      type: object
      required: [withStock, lowStock, outOfStock, stockValue]
      properties:
        withStock:
          type: integer
          minimum: 0
        lowStock:
          type: integer
          minimum: 0
        outOfStock:
          type: integer
          minimum: 0
        stockValue:
          type: number
          minimum: 0

    ProductsWorkspaceResponse:
      type: object
      required: [items, page, pageSize, totalItems, totalPages, summary]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductsWorkspaceItem'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
        summary:
          $ref: '#/components/schemas/ProductsWorkspaceSummary'

    BulkCreateProductsInvalidItem:
      type: object
      required: [row, reason]
      properties:
        row:
          type: integer
          minimum: 1
        name:
          type: string
        reason:
          type: string

    BulkCreateProductsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateProductRequest'

    BulkCreateProductsResponse:
      type: object
      required: [importedCount, items, invalidItems]
      properties:
        importedCount:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        invalidItems:
          type: array
          items:
            $ref: '#/components/schemas/BulkCreateProductsInvalidItem'

    BulkPriceUpdateScope:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [all, category, selection]
        categoryId:
          type: string
        productIds:
          type: array
          items:
            type: string

    BulkPriceUpdateRequest:
      type: object
      required: [scope, mode, value]
      properties:
        scope:
          $ref: '#/components/schemas/BulkPriceUpdateScope'
        mode:
          type: string
          enum: [percentage, fixed_amount]
        value:
          type: number
        previewOnly:
          type: boolean
          default: false

    BulkPriceUpdateItemResult:
      type: object
      required: [productId, oldPrice, newPrice]
      properties:
        productId:
          type: string
        oldPrice:
          type: number
        newPrice:
          type: number

    BulkPriceUpdateInvalidItem:
      type: object
      required: [productId, reason]
      properties:
        productId:
          type: string
        reason:
          type: string

    BulkPriceUpdateResponse:
      type: object
      required: [batchId, updatedCount, items, appliedAt, previewOnly, appliedBy, invalidItems]
      properties:
        batchId:
          type: string
        updatedCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/BulkPriceUpdateItemResult'
        appliedAt:
          type: string
          format: date-time
        previewOnly:
          type: boolean
        appliedBy:
          type: string
        invalidItems:
          type: array
          items:
            $ref: '#/components/schemas/BulkPriceUpdateInvalidItem'

