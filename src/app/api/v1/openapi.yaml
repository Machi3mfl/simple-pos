        invalidItems:
          type: array
          items:
            $ref: '#/components/schemas/ProductSourcingImportInvalidItem'

    ProductSourcingCategoryMapping:
      type: object
      required:
        [id, providerId, externalCategoryPath, internalCategoryId, createdAt, updatedAt]
      properties:
        id:
          type: string
        providerId:
          type: string
          enum: [carrefour]
        externalCategoryPath:
          type: string
        internalCategoryId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductSourcingCategoryMappingsResponse:
      type: object
      required: [items]
