          type: string
        code:
          type: string
        name:
          type: string
        groupCode:
          type: string
        groupLabel:
          type: string
        groupDescription:
          type: string

    AccessControlPermissionGroup:
      type: object
      required: [code, label, description, permissionCodes]
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string
        permissionCodes:
          type: array
          items:
            type: string

    AccessControlRole:
      type: object
      required:
        [
          id,
          code,
          name,
          isSystem,
          isLocked,
          permissionCodes,
          assignedUserCount,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        isSystem:
          type: boolean
        isLocked:
          type: boolean
        clonedFromRoleId:
          type: string
        permissionCodes:
          type: array
          items:
            type: string
        assignedUserCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
        createdByDisplayName:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: string
        updatedByDisplayName:
          type: string

    AccessControlUser:
      type: object
      required:
        [userId, displayName, actorKind, isActive, roleIds, roleCodes, roleNames, assignedRegisterIds]
      properties:
        userId:
          type: string
        displayName:
          type: string
        actorKind:
          type: string
          enum: [human, system]
        isActive:
          type: boolean
        roleIds:
          type: array
          items:
            type: string
        roleCodes:
          type: array
          items:
            type: string
        roleNames:
          type: array
          items:
            type: string
        assignedRegisterIds:
          type: array
          items:
            type: string

    AccessControlWorkspaceResponse:
      type: object
      required: [roles, users, permissions, permissionGroups]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AccessControlRole'
        users:
          type: array
          items:
            $ref: '#/components/schemas/AccessControlUser'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/AccessControlPermission'
        permissionGroups:
          type: array
          items:
            $ref: '#/components/schemas/AccessControlPermissionGroup'

    UpsertRoleRequest:
      type: object
      required: [name, permissionCodes]
