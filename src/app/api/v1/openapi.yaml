              items:
                $ref: '#/components/schemas/CashMovement'

    ActiveCashRegisterSessionResponse:
      type: object
      required: [session]
      properties:
        session:
          oneOf:
            - $ref: '#/components/schemas/CashRegisterSessionDetail'
