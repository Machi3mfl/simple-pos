          status,
          openingFloatAmount,
          expectedBalanceAmount,
          openedAt,
          openedByUserId,
          openedByDisplayName,
        ]
      properties:
        id:
          type: string
        cashRegisterId:
          type: string
        status:
          type: string
          enum: [open, closing_review_required, closed, voided]
        openingFloatAmount:
          type: number
        expectedBalanceAmount:
          type: number
        countedClosingAmount:
          type: number
        discrepancyAmount:
          type: number
        openedAt:
          type: string
          format: date-time
        openedByUserId:
          type: string
        openedByDisplayName:
          type: string
        closeoutSubmittedAt:
          type: string
          format: date-time
        closeoutSubmittedByUserId:
          type: string
        closeoutSubmittedByDisplayName:
          type: string
        closedAt:
          type: string
          format: date-time
        closedByUserId:
          type: string
        closedByDisplayName:
          type: string
        discrepancyApprovedAt:
          type: string
          format: date-time
        discrepancyApprovedByUserId:
          type: string
        discrepancyApprovedByDisplayName:
          type: string
        discrepancyApprovalNotes:
          type: string
        openingNotes:
          type: string
        closingNotes:
          type: string

    ApproveCashRegisterCloseoutRequest:
      type: object
      properties:
        approvalNotes:
          type: string

    CashMovement:
      type: object
      required:
        [
          id,
          movementType,
          direction,
          amount,
          occurredAt,
          performedByUserId,
          performedByDisplayName,
        ]
      properties:
        id:
          type: string
        movementType:
          type: string
          enum:
            [
              opening_float,
              cash_sale,
              debt_payment_cash,
              cash_paid_in,
              cash_paid_out,
              safe_drop,
              refund_cash,
              adjustment,
            ]
        direction:
          type: string
          enum: [inbound, outbound]
        amount:
          type: number
        reasonCode:
          type: string
        notes:
          type: string
        saleId:
          type: string
        debtLedgerEntryId:
          type: string
        occurredAt:
          type: string
          format: date-time
        performedByUserId:
          type: string
        performedByDisplayName:
          type: string

    CashRegisterSessionDetail:
      allOf:
        - $ref: '#/components/schemas/CashRegisterSession'
